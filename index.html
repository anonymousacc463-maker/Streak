<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak Cloud Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}
.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}
.card {
  background: #1e293b;
  padding: 15px;
  margin-top: 12px;
  border-radius: 12px;
}
button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 8px;
  margin-top: 8px;
}
input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
  border: none;
}
label {
  display: block;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginCard" class="card">
<h3>Login</h3>

<select id="user">
<option value="samrat">Samrat</option>
<option value="saborno">Saborno</option>
</select>

<input id="pass" placeholder="password">
<button onclick="login()">Login</button>

<h4>📊 Shared Progress</h4>
<canvas id="chart"></canvas>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="card">
<h3 id="welcome"></h3>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>🔥 Habits</h3>
<div id="habits"></div>
<button onclick="submitData()">Submit</button>
<p id="score"></p>
</div>

</div>

</div>

<script>
const users = { samrat:"samrat123", saborno:"saborno123" };
let currentUser = localStorage.getItem("user");

// 🔥 JSONBIN CONFIG
const BIN_ID = "69f23c0baaba882197515195";
const API_KEY = "$2a$10$HAaJlIo1IbMYWbKyJr5CfODvyZlUMbxeKw1/JMsMM7PbC5WPaKXry";

// 🔥 DATABASE OBJECT (NEW STRUCTURE)
let db = {};
let chart;

let habitsState = {
  water:false,
  workout:false,
  read:false,
  discipline:false
};

/* LOGIN */
function login(){
  if(users[user.value]===pass.value){
    currentUser=user.value;
    localStorage.setItem("user",currentUser);
    start();
  } else alert("Wrong password");
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* START */
function start(){
  loginCard.style.display="none";
  app.style.display="block";
  welcome.innerText="Hello "+currentUser;
  renderHabits();
  fetchData();
}

/* HABITS UI */
function renderHabits(){
  let html="";
  for(let h in habitsState){
    html+=`
    <label>
      <input type="checkbox" onchange="toggleHabit('${h}')">
      ${h}
    </label>`;
  }
  habits.innerHTML=html;
}

function toggleHabit(h){
  habitsState[h]=!habitsState[h];
}

/* SUBMIT (OVERWRITE SYSTEM) */
function submitData(){
  const scoreVal = Object.values(habitsState).filter(x=>x).length;
  document.getElementById("score").innerText = "Score: " + scoreVal;

  const today = new Date().toISOString().split("T")[0];

  if(!db[today]){
    db[today] = { samrat:0, saborno:0 };
  }

  // 🔥 overwrite only current user
  db[today][currentUser] = scoreVal;

  sendData();
}

/* SEND TO JSONBIN */
function sendData(){
  fetch(https://api.jsonbin.io/v3/b/${BIN_ID},{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "X-Master-Key":API_KEY
    },
    body: JSON.stringify(db)
  })
  .then(()=> fetchData());
}

/* FETCH DATA */
function fetchData(){
  fetch(https://api.jsonbin.io/v3/b/${BIN_ID}/latest,{
    headers:{ "X-Master-Key":API_KEY }
  })
  .then(res=>res.json())
  .then(data=>{
    db = data.record || {};
    drawChart();
  });
}

/* DRAW GRAPH */
function drawChart(){
  const labels = Object.keys(db).sort((a,b)=> new Date(a)-new Date(b));

  const samratData = labels.map(d => db[d]?.samrat || 0);
  const sabornoData = labels.map(d => db[d]?.saborno || 0);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {
          label:"Samrat",
          data:samratData
        },
        {
          label:"Saborno",
          data:sabornoData
        }
      ]
    }
  });
}

/* AUTO LOAD */
fetchData();

if(currentUser){
  start();
}
</script>

</body>
</html>
