<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; margin:0; background:#f4f4f4; }
.container { max-width:500px; margin:auto; padding:10px; }
.card { background:white; padding:15px; margin-top:10px; border-radius:10px; }
button { padding:8px; background:black; color:white; border:none; border-radius:5px; }
input { padding:8px; width:100%; margin-top:5px; }
.day { display:inline-block; width:40px; margin:3px; padding:5px; text-align:center; cursor:pointer; background:white; }
.active { background:black; color:white; }
</style>
</head>

<body>

<div class="container">

<div id="loginCard" class="card">
<h3>Login</h3>

<select id="user">
<option value="samrat">Samrat</option>
<option value="saborno">Saborno</option>
</select>

<input id="pass" placeholder="password">
<button onclick="login()">Login</button>

<h4>📊 Shared Progress</h4>
<canvas id="loginChart"></canvas>

</div>

<div id="app" style="display:none">

<div class="card">
<h3 id="welcome"></h3>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<div class="card">
<h3>📅 Calendar</h3>
<div id="calendar"></div>
</div>

<div class="card">
<h3>🔥 Habits</h3>
<div id="habits"></div>
<p id="score"></p>
<p id="streak"></p>
</div>

<div class="card">
<h3>📝 Todos</h3>
<div id="todos"></div>
<input id="todoInput" placeholder="Add task">
<button onclick="addTodo()">Add</button>
</div>

</div>

</div>

<script>
const users = { samrat:"samrat123", saborno:"saborno123" };
let currentUser = localStorage.getItem("user");
let selectedDate = today();
let data = JSON.parse(localStorage.getItem("data")) || {};
let chartInstance;

function today(){
  return new Date().toISOString().split("T")[0];
}

function save(){
  localStorage.setItem("data", JSON.stringify(data));
}

function defaultUser(){
  return {
    habits:{ water:false, workout:false, read:false, discipline:false },
    todos:[],
    streak:0,
    lastActive:""
  };
}

function login(){
  if(users[user.value] === pass.value){
    currentUser = user.value;
    localStorage.setItem("user",currentUser);
    start();
  } else alert("Wrong password");
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

function start(){
  loginCard.style.display="none";
  app.style.display="block";
  welcome.innerText="Hello "+currentUser;
  renderCalendar();
  openDay(selectedDate);
}

function initDay(date){
  if(!data[date]){
    data[date]={ samrat:defaultUser(), saborno:defaultUser() };
  }
}

function renderCalendar(){
  calendar.innerHTML="";
  for(let i=1;i<=30;i++){
    const d=`2026-04-${String(i).padStart(2,"0")}`;
    calendar.innerHTML+=`<div class="day ${d===selectedDate?"active":""}" onclick="openDay('${d}')">${i}</div>`;
  }
}

function openDay(date){
  selectedDate=date;
  initDay(date);
  renderCalendar();
  render();
  updateLeaderboard();
}

function render(){
  const d = data[selectedDate][currentUser];

  habits.innerHTML="";
  Object.keys(d.habits).forEach(h=>{
    habits.innerHTML+=`
    <label>
    <input type="checkbox" ${d.habits[h]?"checked":""}
    onchange="toggleHabit('${h}')">${h}
    </label><br>`;
  });

  const scoreVal = Object.values(d.habits).filter(x=>x).length;
  score.innerText="Score: "+scoreVal;
  streak.innerText="Streak: "+d.streak;

  todos.innerHTML="";
  d.todos.forEach((t,i)=>{
    todos.innerHTML+=`
    <div>
    <input type="checkbox" ${t.done?"checked":""}
    onchange="toggleTodo(${i})">
    ${t.text}
    </div>`;
  });
}

function toggleHabit(h){
  const d = data[selectedDate][currentUser];
  d.habits[h]=!d.habits[h];

  const scoreVal = Object.values(d.habits).filter(x=>x).length;
  const yesterday = new Date(Date.now()-86400000).toISOString().split("T")[0];

  if(d.lastActive===yesterday && scoreVal>0) d.streak++;
  else if(scoreVal>0) d.streak=1;

  d.lastActive=selectedDate;

  save();
  render();
  updateLeaderboard();
  drawLoginChart();
}

function addTodo(){
  const d = data[selectedDate][currentUser];
  d.todos.push({ text:todoInput.value, done:false });
  todoInput.value="";
  save();
  render();
}

function toggleTodo(i){
  const t = data[selectedDate][currentUser].todos[i];
  t.done=!t.done;
  save();
  render();
}

function updateLeaderboard(){
  let sScore=0, saScore=0;

  Object.values(data).forEach(day=>{
    sScore += Object.values(day.samrat.habits).filter(x=>x).length;
    saScore += Object.values(day.saborno.habits).filter(x=>x).length;
  });

  let leader="Tie";
  if(sScore>saScore) leader="Samrat 🔥";
  else if(saScore>sScore) leader="Saborno 🔥";

  leaderboard.innerHTML=`
  Leader: ${leader}<br>
  Samrat: ${sScore}<br>
  Saborno: ${saScore}`;
}

/* 📊 LOGIN PAGE CHART */
function drawLoginChart(){
  const labels = [];
  const samratData = [];
  const sabornoData = [];

  Object.keys(data).sort().forEach(date=>{
    labels.push(date.slice(5));

    const s = Object.values(data[date].samrat.habits).filter(x=>x).length;
    const sa = Object.values(data[date].saborno.habits).filter(x=>x).length;

    samratData.push(s);
    sabornoData.push(sa);
  });

  const ctx = document.getElementById("loginChart");
  if(!ctx) return;

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        { label: "Samrat", data: samratData },
        { label: "Saborno", data: sabornoData }
      ]
    }
  });
}

drawLoginChart();

if(currentUser){
  start();
}
</script>

</body>
</html>
