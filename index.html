<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak Cloud</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; background:#0f172a; color:white; margin:0; }
.container { max-width:500px; margin:auto; padding:15px; }
.card { background:#1e293b; padding:15px; margin-top:10px; border-radius:10px; }
button { width:100%; padding:10px; background:#22c55e; border:none; color:white; border-radius:8px; margin-top:8px; }
input, select { width:100%; padding:8px; margin-top:5px; border-radius:6px; border:none; }
label { display:block; margin-top:6px; }
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginCard" class="card">
<h3>Login</h3>

<select id="user">
<option value="samrat">Samrat</option>
<option value="saborno">Saborno</option>
</select>

<input id="pass" placeholder="password">
<button onclick="login()">Login</button>

<h4>📊 Shared Progress</h4>
<canvas id="chart"></canvas>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="card">
<h3 id="welcome"></h3>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>🔥 Habits</h3>
<div id="habits"></div>
<button onclick="submitData()">Submit</button>
<p id="score"></p>
</div>

</div>

</div>

<script>
const users = { samrat:"samrat123", saborno:"saborno123" };
let currentUser = localStorage.getItem("user");

// 🔥 JSONBIN CONFIG
const BIN_ID = "YOUR_BIN_ID";
const API_KEY = "YOUR_API_KEY";

let logs = [];
let chart;
let habitsState = {
  water:false, workout:false, read:false, discipline:false
};

/* LOGIN */
function login(){
  if(users[user.value]===pass.value){
    currentUser=user.value;
    localStorage.setItem("user",currentUser);
    start();
  } else alert("Wrong password");
}

function logout(){
  localStorage.removeItem("user");
  location.reload();
}

/* START */
function start(){
  loginCard.style.display="none";
  app.style.display="block";
  welcome.innerText="Hello "+currentUser;
  renderHabits();
  fetchData();
}

/* HABITS UI */
function renderHabits(){
  let html="";
  for(let h in habitsState){
    html+=`
    <label>
    <input type="checkbox" onchange="toggleHabit('${h}')">
    ${h}
    </label>`;
  }
  habits.innerHTML=html;
}

function toggleHabit(h){
  habitsState[h]=!habitsState[h];
}

/* SUBMIT DATA */
function submitData(){
  const score = Object.values(habitsState).filter(x=>x).length;
  score.innerText = "Score: " + score;

  const entry = {
    date: new Date().toISOString().split("T")[0],
    user: currentUser,
    score: score
  };

  logs.push(entry);
  sendData();
}

/* SEND TO JSONBIN */
function sendData(){
  fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "X-Master-Key":API_KEY
    },
    body: JSON.stringify(logs)
  })
  .then(()=>{
    fetchData();
  });
}

/* FETCH DATA */
function fetchData(){
  fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
    headers:{ "X-Master-Key":API_KEY }
  })
  .then(res=>res.json())
  .then(data=>{
    logs = data.record || [];
    drawChart();
  });
}

/* DRAW GRAPH */
function drawChart(){
  const labels = [];
  const samratData = [];
  const sabornoData = [];

  logs.forEach(e=>{
    if(!labels.includes(e.date)) labels.push(e.date);
  });

  labels.sort();

  labels.forEach(date=>{
    let s=0, sa=0;

    logs.forEach(e=>{
      if(e.date===date){
        if(e.user==="samrat") s=e.score;
        if(e.user==="saborno") sa=e.score;
      }
    });

    samratData.push(s);
    sabornoData.push(sa);
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        { label:"Samrat", data:samratData },
        { label:"Saborno", data:sabornoData }
      ]
    }
  });
}

/* AUTO LOAD */
fetchData();

if(currentUser){
  start();
}
</script>

</body>
</html>
