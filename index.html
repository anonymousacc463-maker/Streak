<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family:sans-serif; margin:0; background:#f5f5f5; }
.container { padding:15px; max-width:500px; margin:auto; }
.card { background:white; padding:15px; margin-top:10px; border-radius:10px; }
button { padding:8px 12px; border:none; border-radius:6px; background:black; color:white; }
input { padding:8px; margin-top:5px; width:100%; }
.day { display:inline-block; width:40px; margin:2px; padding:5px; background:white; text-align:center; cursor:pointer; }
.active { background:black; color:white; }
</style>
</head>

<body>

<div class="container">

<div id="loginCard" class="card">
<h3>Login</h3>
<select id="user">
<option value="samrat">Samrat</option>
<option value="saborno">Saborno</option>
</select>
<input id="pass" placeholder="password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
<h3 id="welcome"></h3>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>📅 Calendar</h3>
<div id="calendar"></div>
</div>

<div class="card">
<h3>🔥 Habits</h3>
<div id="habits"></div>
<p id="score"></p>
</div>

<div class="card">
<h3>📝 Todos</h3>
<div id="todos"></div>
<input id="todoInput" placeholder="Add task">
<button onclick="addTodo()">Add</button>
</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 PASTE FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyCV2oB-UEoj33QTYGuyMxYow-DyXCQSLtc",
  authDomain: "streaks-2561c.firebaseapp.com",
  projectId: "streaks-2561c",
  storageBucket: "streaks-2561c.firebasestorage.app",
  messagingSenderId: "1066833378440",
  appId: "1:1066833378440:web:a8dfb63653c7001cd0333d",
  measurementId: "G-L9J6E0R0GH"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const users = { samrat:"samrat123", saborno:"saborno123" };
let currentUser = localStorage.getItem("user");
let selectedDate = today();

function today(){
  return new Date().toISOString().split("T")[0];
}

function ref(date){
  return doc(db,"days",date);
}

window.login = function(){
  if(users[user.value] === pass.value){
    currentUser = user.value;
    localStorage.setItem("user",currentUser);
    start();
  } else alert("Wrong password");
};

window.logout = function(){
  localStorage.removeItem("user");
  location.reload();
};

function start(){
  loginCard.style.display="none";
  app.style.display="block";
  welcome.innerText = "Hello " + currentUser;

  renderCalendar();
  loadDay(selectedDate);
}

function renderCalendar(){
  calendar.innerHTML="";
  for(let i=1;i<=30;i++){
    const d=`2026-04-${String(i).padStart(2,"0")}`;
    calendar.innerHTML += `<div class="day ${d===selectedDate?"active":""}" onclick="changeDate('${d}')">${i}</div>`;
  }
}

window.changeDate = function(d){
  selectedDate = d;
  renderCalendar();
  loadDay(d);
};

function defaultData(){
  return {
    habits:{ water:false, workout:false, read:false, discipline:false },
    todos:[]
  };
}

function loadDay(date){
  onSnapshot(ref(date), snap=>{
    const data = snap.data() || {};
    render(data[currentUser] || defaultData(), data);
  });
}

function render(userData, allData){
  // habits
  habits.innerHTML="";
  Object.keys(userData.habits).forEach(h=>{
    habits.innerHTML += `
    <label>
    <input type="checkbox" ${userData.habits[h]?"checked":""}
    onchange="toggleHabit('${h}')">
    ${h}
    </label><br>`;
  });

  score.innerText = "Score: " + Object.values(userData.habits).filter(x=>x).length;

  // todos
  todos.innerHTML="";
  userData.todos.forEach((t,i)=>{
    todos.innerHTML += `
    <div>
    <input type="checkbox" ${t.done?"checked":""}
    onchange="toggleTodo(${i})">
    ${t.text}
    </div>`;
  });
}

window.toggleHabit = async function(h){
  const snap = await getDoc(ref(selectedDate));
  const data = snap.data() || {};
  const userData = data[currentUser] || defaultData();

  userData.habits[h] = !userData.habits[h];

  await setDoc(ref(selectedDate), { [currentUser]: userData }, { merge:true });
};

window.addTodo = async function(){
  const snap = await getDoc(ref(selectedDate));
  const data = snap.data() || {};
  const userData = data[currentUser] || defaultData();

  userData.todos.push({ text:todoInput.value, done:false });
  todoInput.value="";

  await setDoc(ref(selectedDate), { [currentUser]: userData }, { merge:true });
};

window.toggleTodo = async function(i){
  const snap = await getDoc(ref(selectedDate));
  const data = snap.data();
  const userData = data[currentUser];

  userData.todos[i].done = !userData.todos[i].done;

  await setDoc(ref(selectedDate), { [currentUser]: userData }, { merge:true });
};

if(currentUser){
  start();
}
</script>

</body>
</html>
